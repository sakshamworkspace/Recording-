<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricxCrate Pro Recorder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root {
            --primary: #ff1e1e;
            --success: #00c853;
            --bg-dark: #0a0e14;
            --card-bg: #161b22;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        video { width: 100%; height: 100%; }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #startBtn { background: var(--primary); color: white; }
        #stopBtn { background: #30363d; color: #8b949e; cursor: not-allowed; }

        button:active { transform: scale(0.98); }
        
        .recording-active #stopBtn {
            background: white;
            color: black;
            cursor: pointer;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .recording-active .status-dot {
            background-color: var(--primary);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body id="body">

<div class="player-card">
    <div class="video-box">
        <video id="video" crossorigin="anonymous" autoplay playsinline muted></video>
    </div>
    
    <div style="margin-bottom: 10px; font-size: 0.9rem;">
        <span class="status-dot"></span>
        <span id="statusTxt">Source: Star Sports 1HD</span>
    </div>

    <div class="btn-group">
        <button id="startBtn">START RECORDING</button>
        <button id="stopBtn" disabled>END RECORDING</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusTxt = document.getElementById('statusTxt');
    const body = document.getElementById('body');

    let mediaRecorder;
    let recordedChunks = [];

    // Initialize Player
    async function init() {
        const player = new shaka.Player(video);
        try {
            // Replace this URL with the actual manifest (.m3u8) if the link doesn't auto-resolve
            await player.load('https://livetv7.pages.dev/4?id=1HD');
        } catch (e) {
            console.error("Stream Load Error", e);
        }
    }

    startBtn.onclick = () => {
        recordedChunks = [];
        
        // Ensure stream is captured at 60fps
        const stream = video.captureStream(60); 
        
        const options = {
            mimeType: 'video/webm;codecs=vp9,opus',
            videoBitsPerSecond: 8000000 // High bitrate for 1080p
        };

        mediaRecorder = new MediaRecorder(stream, options);

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `CricxCrate_HQ_${Date.now()}.webm`;
            a.click();
            statusTxt.innerText = "Recording Saved.";
        };

        mediaRecorder.start();
        
        // UI Updates
        body.classList.add('recording-active');
        startBtn.disabled = true;
        startBtn.style.opacity = "0.5";
        stopBtn.disabled = false;
        statusTxt.innerText = "Recording LIVE (1080p 60fps)...";
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        
        // Reset UI
        body.classList.remove('recording-active');
        startBtn.disabled = false;
        startBtn.style.opacity = "1";
        stopBtn.disabled = true;
        statusTxt.innerText = "Processing File...";
    };

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
  </html>
