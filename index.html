<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricxCrate Recorder PRO</title>

<style>
:root {
  --primary:#ff1e1e;
  --bg:#0a0e14;
  --card:#161b22;
}

body {
  margin:0;
  background:var(--bg);
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:90%;
  max-width:500px;
  background:var(--card);
  padding:20px;
  border-radius:20px;
}

.video-box {
  width:100%;
  aspect-ratio:16/9;
  background:black;
  border-radius:12px;
  overflow:hidden;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

button {
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

#startBtn {background:red;color:white;}
#stopBtn {background:white;color:black;display:none;}

.status {
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="video-box">
<iframe 
  src="https://b-player2.pages.dev/p1?id=skynz-4k"
  allow="autoplay; encrypted-media; fullscreen"
  allowfullscreen
  referrerpolicy="no-referrer">
</iframe>
</div>

<button id="startBtn">Start Recording</button>
<button id="stopBtn">Stop & Save</button>

<div class="status" id="status">Ready</div>

</div>

<script>
let recorder, chunks=[];

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const status = document.getElementById("status");

startBtn.onclick = async () => {

  // ✅ Check support FIRST
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    status.innerText = "❌ Not supported on this device";
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video:true,
      audio:true
    });

    recorder = new MediaRecorder(stream);
    chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, {type:"video/webm"});
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "CricxCrate_recording.webm";
      a.click();

      status.innerText = "✅ Saved successfully";
    };

    recorder.start();

    status.innerText = "🔴 Recording...";

    startBtn.style.display="none";
    stopBtn.style.display="block";

  } catch (err) {
    status.innerText = "❌ Permission denied / Not supported";
    console.log(err);
  }
};

stopBtn.onclick = () => {
  recorder.stop();
  recorder.stream.getTracks().forEach(t => t.stop());

  startBtn.style.display="block";
  stopBtn.style.display="none";
};
</script>

</body>
</html>
