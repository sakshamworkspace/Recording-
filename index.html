<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricxCrate Pro Recorder</title>
    <style>
        :root {
            --primary: #ff1e1e;
            --bg: #0a0e14;
            --card: #161b22;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #startBtn { background: var(--primary); color: white; }
        #stopBtn { 
            background: #ffffff; 
            color: #000; 
            display: none; /* Hidden by default */
        }

        button:active { transform: scale(0.96); }

        .status-area {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #8b949e;
            text-align: center;
        }

        .rec-dot {
            height: 8px;
            width: 8px;
            background: red;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="video-box" id="playerNode">
        <!-- Using Iframe as the primary source -->
        <iframe 
            id="streamFrame"
            src="https://livetv7.pages.dev/4?id=1HD" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="btn-stack">
        <button id="startBtn">Start 1080p Recording</button>
        <button id="stopBtn">End Recording & Save</button>
    </div>

    <div class="status-area" id="status">
        Ready to capture Star Sports 1HD
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    let mediaRecorder;
    let recordedChunks = [];

    startBtn.onclick = async () => {
        try {
            // Note: Recording iframes directly is blocked by browser security.
            // This setup uses the MediaStream approach. 
            // On Mobile: You must use a browser like Kiwi or Firefox that supports extensions 
            // if you want to record internal tabs perfectly.
            
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { frameRate: 60, width: 1920, height: 1080 },
                audio: true
            });

            mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 8000000 
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `CricxCrate_Clip_${Date.now()}.webm`;
                a.click();
                
                startBtn.style.display = "block";
                stopBtn.style.display = "none";
                status.innerHTML = "Clip saved to device.";
            };

            mediaRecorder.start();
            
            startBtn.style.display = "none";
            stopBtn.style.display = "block";
            status.innerHTML = '<span class="rec-dot"></span> RECORDING AT 60FPS';

        } catch (err) {
            status.style.color = "#ff4444";
            status.innerText = "Please use Chrome on Desktop or enable 'Desktop Site' in mobile Chrome.";
        }
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
    };
</script>

</body>
</html>
